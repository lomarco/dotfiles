min-width = 240
max-width = 420
max-height = 0
edge-margin-vertical = 14
edge-margin-horizontal = 14
notification-margin = 12
padding-vertical = 12
padding-horizontal = 14
border-radius = 8
border-size = 1
stacking-order = bottom-up
anchor = bottom-right
scaling-filter = lanczos3
selection-helper = fuzzel --dmenu0
selection-helper-uses-null-separator = yes
play-sound = paplay ${filename}
layer = top
background = 1f2124ff
border-color = 2f3438ff
dpi-aware = yes
default-timeout = 8
max-timeout = 0
idle-timeout = 0
title-font = Inter:size=8:weight=600
title-color = ffffffff
title-format = <i>%a%A</i>
summary-font = Inter:size=8:weight=500
summary-color = ffffffff
summary-format = <b>%s\n</b>
body-font = Inter:size=7:weight=400
body-color = e6e6e6ff
body-format = %b
progress-bar-height = 8
progress-color = 88c0d0ff
progress-style = bar

[low]
background = 111214ff
title-color = 8a8f93ff
summary-color = 8a8f93ff
body-color = 8a8f93ff

[normal]
background = 1a1c1eff

[critical]
background = 6c3333ff
title-color = ffffffff
summary-color = ffffffff
body-color = ffffffff
border-color = d87a7aff
