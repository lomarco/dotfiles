min-width = 200
max-width = 320
max-height = 160
edge-margin-vertical = 8
edge-margin-horizontal = 8
notification-margin = 8
padding-vertical = 8
padding-horizontal = 8
border-radius = 6
border-size = 1
stacking-order = bottom-up
anchor = bottom-right
scaling-filter = lanczos3
selection-helper = fuzzel --dmenu0
selection-helper-uses-null-separator = yes
play-sound = paplay ${filename}
layer = top
background = 1f2124ff
border-color = 2f3438ff
dpi-aware = yes
default-timeout = 8
max-timeout = 0
idle-timeout = 0
title-font = Inter:size=7:weight=600
title-color = ffffffff
title-format = <i>%a%A</i>
summary-font = Inter:size=7:weight=500
summary-color = ffffffff
summary-format = <b>%s</b>
body-font = Inter:size=6:weight=400
body-color = e6e6e6ff
body-format = %b
progress-bar-height = 6
progress-color = 88c0d0ff
progress-style = bar

[low]
background = 111214ff
title-color = 8a8f93ff
summary-color = 8a8f93ff
body-color = 8a8f93ff

[normal]
background = 1a1c1eff

[critical]
background = 6c3333ff
title-color = ffffffff
summary-color = ffffffff
body-color = ffffffff
border-color = d87a7aff
