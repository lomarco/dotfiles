[[block]]
block = "battery"
interval = 5
format = " $icon $percentage {$time_remaining.dur(hms:true, min_unit:m)|} {$power|} "
charging_format = " $icon $percentage {$time_remaining.dur(hms:true, min_unit:m)|} {$power|} "
full_format = " $icon $percentage {$power|} "
empty_format = " $icon Empty: $percentage {$power|} "
not_charging_format = " $icon $percentage {$time_remaining.dur(hms:true, min_unit:m)|} {$power|} "

[[block]]
block = "sound"
device_kind = "sink"
show_volume_when_muted = true
headphones_indicator = true
format = " $icon {$volume|} $output_description "

[[block]]
block = "load"
format = " $icon $1m.eng(w:4) $5m.eng(w:4) $15m.eng(w:4) "
interval = 1

[[block]]
block = "net"
format = " $icon {$signal_strength $ssid $frequency|Wired connection} via $device "

[[block]]
block = "time"
interval = 1
[block.format]
full = " $timestamp.datetime(f:'%a %Y-%m-%d %H:%M:%S') "

